# Change prefix to Ctrl+a
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g mouse on
set -g status-position top
set -g extended-keys on
set -g extended-keys-format csi-u

# Keybindings
## Reload config
bind r source-file ~/.tmux.conf \; display-message "✓ Config reloaded"

## Split window
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

## Pane navigation (Alt+Arrow keys)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

## Resize pane (prefix + Shift+Arrow keys)
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up    resize-pane -U 5
bind -r S-Down  resize-pane -D 5

## Change window
bind -n M-H previous-window # Alt+Shift+H
bind -n M-L next-window     # Alt+Shift+L

# Vi mode for pane navigation
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"  # copy ke clipboard
bind -T copy-mode-vi Escape send -X cancel

set-hook -g client-dark-theme {
  set -g @catppuccin_flavor "mocha"
  set -g @catppuccin_reset "true"
  set -g @catppuccin_window_status_style "rounded"

  run ~/.tmux/plugins/tmux/catppuccin.tmux
}
set-hook -g client-light-theme {
  set -g @catppuccin_flavor "latte"
  set -g @catppuccin_reset "true"
  set -g @catppuccin_window_status_style "rounded"

  run ~/.tmux/plugins/tmux/catppuccin.tmux
}

set -gq allow-passthrough on

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Variables
TMUX_FZF_MENU_POPUP=1

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'sainnhe/tmux-fzf'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
